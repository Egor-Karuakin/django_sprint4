<div class="card mb-4">
    {% if post.image %}
    <img src="{{ post.image.url }}" class="card-img-top" alt="{{ post.title }}" style="max-height: 300px; object-fit: cover;">
    {% endif %}
    <div class="card-body">
        <h5 class="card-title">
            <a href="{% url 'blog:post_detail' post.pk %}" class="text-decoration-none">
                {{ post.title }}
            </a>
        </h5>
        <p class="card-text">{{ post.text|truncatewords:30 }}</p>
        <div class="text-muted small">
            <span>Автор: {{ post.author.username }}</span>
            <span class="mx-2">|</span>
            <span>Дата: {{ post.pub_date|date:"d.m.Y H:i" }}</span>
            <span class="mx-2">|</span>
            <span>({{ post.comments.count }})</span>
        </div>
    </div>
</div>
