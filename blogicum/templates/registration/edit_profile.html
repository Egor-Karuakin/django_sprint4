{% extends "base.html" %}
{% load django_bootstrap5 %}

{% block content %}
<div class="container py-4">
    <h1 class="mb-4">Редактирование профиля</h1>
    <form method="post">
        {% csrf_token %}
        {% bootstrap_form form %}
        <div class="mt-3">
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="{% url 'blog:profile' profile.username %}" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
